services:
  parkingdb:
    image: postgres:16
    container_name: parkingdb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: parkingdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - parkingdb_data:/var/lib/postgresql/data

volumes:
  parkingdb_data:
